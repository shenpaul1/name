<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全功能抽籤系統 - 預覽版</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; color: #333; margin: 0; padding: 20px; }
        .grid-container { display: grid; grid-template-columns: 1fr 1.5fr 1fr; gap: 20px; max-width: 1400px; margin: 0 auto; }
        .panel { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); display: flex; flex-direction: column; }
        .panel h3 { margin-top: 0; color: #1a73e8; border-bottom: 2px solid #f0f2f5; padding-bottom: 10px; font-size: 18px; }
        
        /* 左側表單與預覽 */
        .input-group { background: #f8f9fa; padding: 12px; border-radius: 8px; border: 1px solid #e9ecef; margin-bottom: 15px; }
        .flex-row { display: flex; gap: 8px; margin-bottom: 8px; }
        input[type="text"] { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        textarea { width: 100%; height: 80px; box-sizing: border-box; padding: 10px; border: 1px solid #ccc; border-radius: 4px; resize: none; font-size: 13px; }
        
        /* 待抽名單預覽區 */
        .preview-area { background: #fff; border: 1px solid #ddd; border-radius: 4px; height: 200px; overflow-y: auto; padding: 5px; font-size: 13px; margin-bottom: 10px; }
        .preview-item { padding: 4px 8px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; }
        .preview-item:last-child { border-bottom: none; }
        .preview-item span { color: #666; font-family: monospace; }

        .btn { display: block; width: 100%; padding: 10px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: bold; transition: 0.2s; margin-top: 5px; }
        .btn-add { background-color: #2ecc71; color: white; }
        .btn-update { background-color: #3498db; color: white; }
        .btn-clear { background-color: #95a5a6; color: white; margin-top: 15px; }

        /* 中間抽籤區樣式 */
        .draw-status { display: flex; justify-content: space-between; font-size: 16px; font-weight: bold; margin-bottom: 20px; background: #e8f4fd; padding: 15px; border-radius: 8px;}
        .btn-draw { background-color: #e74c3c; color: white; font-size: 24px; padding: 20px; border-radius: 50px; box-shadow: 0 4px 0 #c0392b; margin-bottom: 30px; cursor: pointer; border: none; width: 100%; }
        .btn-draw:disabled { background-color: #bdc3c7; box-shadow: 0 4px 0 #95a5a6; cursor: not-allowed; }
        .winner-box { text-align: center; padding: 40px 20px; background: #fffde7; border: 3px dashed #fbc02d; border-radius: 12px; min-height: 150px; }
        .winner-name { font-size: 42px; font-weight: bold; color: #d32f2f; margin: 0; }
        
        /* 右側紀錄區 */
        .history-list { height: 550px; overflow-y: auto; }
        .history-item { background: #f9f9f9; padding: 10px; margin-bottom: 8px; border-radius: 6px; border-left: 4px solid #2ecc71; display: flex; justify-content: space-between; }

        .spinning { color: #3498db; opacity: 0.7; }
        @media (max-width: 900px) { .grid-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<h1 style="text-align: center; color: #2c3e50;">🎯 全功能抽籤系統 (含即時預覽)</h1>

<div class="grid-container">
    <div class="panel">
        <h3>⚙️ 名單管理</h3>
        
        <div class="input-group">
            <div class="flex-row">
                <input type="text" id="single-id" placeholder="學號">
                <input type="text" id="single-name" placeholder="姓名">
            </div>
            <button class="btn btn-add" onclick="addSingle()">快速新增單筆</button>
            <hr style="margin: 10px 0; border: none; border-top: 1px solid #ddd;">
            <input type="file" id="file-upload" accept=".txt,.csv" style="font-size: 12px; width: 100%;">
            <textarea id="bulk-text" placeholder="或在此貼上多筆資料..."></textarea>
            <button class="btn btn-update" onclick="loadBulk()">覆蓋並重新載入</button>
        </div>

        <p style="font-size: 14px; font-weight: bold; margin-bottom: 5px;">👀 目前待抽名單預覽：</p>
        <div id="preview-area" class="preview-area">
            <div style="color: #aaa; text-align: center; padding-top: 20px;">目前名單是空的</div>
        </div>
        
        <button class="btn btn-clear" onclick="clearAll()">🗑️ 清空所有名單</button>
    </div>

    <div class="panel">
        <h3>🎲 隨機抽籤</h3>
        <div class="draw-status">
            <span>待抽：<span id="remain-count" style="color:#1a73e8">0</span> 人</span>
            <span>已抽：<span id="drawn-count" style="color:#e74c3c">0</span> 人</span>
        </div>
        
        <button id="draw-btn" class="btn-draw" onclick="startDraw()" disabled>🎊 開始抽籤 🎊</button>

        <div class="winner-box">
            <div style="color: #888; font-size: 14px; margin-bottom: 10px;">恭喜幸運兒</div>
            <div id="winner-name" class="winner-name">---</div>
            <div id="winner-id" style="font-size: 20px; color: #555; margin-top: 10px;"></div>
        </div>
    </div>

    <div class="panel">
        <h3>🏆 中獎歷史</h3>
        <div id="history-list" class="history-list"></div>
    </div>
</div>

<script>
    let pool = [];
    let drawn = [];
    let isSpinning = false;
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playWinSound() {
        const notes = [523.25, 659.25, 783.99, 1046.50];
        notes.forEach((freq, i) => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime + i * 0.1);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime + i * 0.1);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i * 0.1 + 0.5);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(audioCtx.currentTime + i * 0.1);
            osc.stop(audioCtx.currentTime + i * 0.1 + 0.5);
        });
    }

    // 單筆新增
    function addSingle() {
        const id = document.getElementById('single-id').value.trim() || '---';
        const name = document.getElementById('single-name').value.trim();
        if (!name) return alert('姓名必填！');
        pool.push({ id, name });
        document.getElementById('single-id').value = '';
        document.getElementById('single-name').value = '';
        updateUI();
    }

    // 批次載入
    function loadBulk() {
        const text = document.getElementById('bulk-text').value.trim();
        if (!text) return alert('請貼上內容');
        pool = text.split('\n').filter(l => l.trim()).map(l => {
            const p = l.trim().split(/[,，\s\t]+/);
            return { id: p.length > 1 ? p[0] : '---', name: p.length > 1 ? p[1] : p[0] };
        });
        drawn = [];
        updateUI();
    }

    // 檔案上傳
    document.getElementById('file-upload').addEventListener('change', function(e) {
        const reader = new FileReader();
        reader.onload = (e) => document.getElementById('bulk-text').value = e.target.result;
        reader.readAsText(e.target.files[0]);
    });

    function clearAll() {
        if(!confirm('確定清空？')) return;
        pool = []; drawn = []; updateUI();
        document.getElementById('winner-name').innerText = '---';
        document.getElementById('winner-id').innerText = '';
    }

    function startDraw() {
        if (pool.length === 0 || isSpinning) return;
        isSpinning = true;
        updateUI();
        
        const winIdx = Math.floor(Math.random() * pool.length);
        const winner = pool[winIdx];
        const nameEl = document.getElementById('winner-name');
        nameEl.classList.add('spinning');
        
        let count = 0, delay = 40;
        function spin() {
            if (count < 25) {
                const temp = pool[Math.floor(Math.random() * pool.length)];
                nameEl.innerText = temp.name;
                count++;
                delay += count * 2;
                setTimeout(spin, delay);
            } else {
                pool.splice(winIdx, 1);
                drawn.unshift(winner);
                nameEl.innerText = winner.name;
                nameEl.classList.remove('spinning');
                document.getElementById('winner-id').innerText = winner.id !== '---' ? `學號: ${winner.id}` : '';
                playWinSound();
                isSpinning = false;
                updateUI();
            }
        }
        spin();
    }

    function updateUI() {
        document.getElementById('remain-count').innerText = pool.length;
        document.getElementById('drawn-count').innerText = drawn.length;
        document.getElementById('draw-btn').disabled = (pool.length === 0 || isSpinning);
        
        // 更新預覽區
        const previewEl = document.getElementById('preview-area');
        if (pool.length === 0) {
            previewEl.innerHTML = '<div style="color: #aaa; text-align: center; padding-top: 20px;">目前名單是空的</div>';
        } else {
            previewEl.innerHTML = pool.map(p => `
                <div class="preview-item">
                    <b>${p.name}</b>
                    <span>${p.id}</span>
                </div>
            `).join('');
        }

        // 更新歷史紀錄
        const histEl = document.getElementById('history-list');
        histEl.innerHTML = drawn.map(p => `
            <div class="history-item">
                <span>${p.name}</span>
                <span style="color:#7f8c8d; font-size:12px">${p.id}</span>
            </div>
        `).join('');
    }
</script>
</body>
</html>
