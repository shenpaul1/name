<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>不重複隨機抽籤系統</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f0f2f5; color: #333; line-height: 1.6; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #1a73e8; }
        .setup-section, .draw-section { margin-bottom: 30px; padding: 20px; border: 1px solid #eee; border-radius: 8px; }
        textarea { width: 100%; height: 150px; margin: 10px 0; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; font-family: monospace; }
        .controls { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
        button { padding: 10px 20px; cursor: pointer; border: none; border-radius: 4px; font-size: 16px; transition: 0.2s; }
        .btn-primary { background: #1a73e8; color: white; }
        .btn-primary:hover { background: #1557b0; }
        .btn-draw { background: #34a853; color: white; width: 100%; font-size: 24px; padding: 20px; margin-top: 10px; }
        .btn-draw:disabled { background: #ccc; cursor: not-allowed; }
        #winner-display { text-align: center; margin: 20px 0; min-height: 120px; padding: 20px; background: #fffde7; border: 2px dashed #fbc02d; border-radius: 8px; }
        #winner-name { font-size: 48px; font-weight: bold; color: #d32f2f; margin: 0; }
        #winner-id { font-size: 24px; color: #555; }
        .stats { display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 10px; }
        .history { max-height: 200px; overflow-y: auto; background: #fafafa; padding: 10px; border-radius: 4px; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🎊 不重複隨機抽籤系統</h1>

    <div class="setup-section">
        <h3>1. 匯入名單</h3>
        <p>請輸入或貼上名單 (每行一筆，格式：學號 姓名 或 學號,姓名)</p>
        <textarea id="input-list" placeholder="範例：&#10;1001 王小明&#10;1002 李小華"></textarea>
        <div class="controls">
            <input type="file" id="file-upload" accept=".txt,.csv">
            <button class="btn-primary" onclick="generateSamples()">產生100筆範例</button>
            <button class="btn-primary" onclick="updateList()">確認更新名單</button>
        </div>
    </div>

    <div class="draw-section">
        <div class="stats">
            <span>剩餘人數：<span id="remain-count">0</span></span>
            <span>已抽出：<span id="drawn-count">0</span></span>
        </div>
        
        <button id="draw-btn" class="btn-draw" onclick="draw()">🎲 隨機抽取一位</button>

        <div id="winner-display">
            <p id="winner-label" style="margin:0; color:#888;">恭喜中獎者</p>
            <h2 id="winner-name">請點擊按鈕抽籤</h2>
            <div id="winner-id"></div>
        </div>
    </div>

    <h3>抽籤歷史紀錄</h3>
    <div id="history-list" class="history">尚未有紀錄</div>
</div>

<script>
    let pool = [];
    let drawn = [];
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    // 播放中獎音效 (使用 Web Audio API 合成聲音)
    function playWinSound() {
        const notes = [523.25, 659.25, 783.99, 1046.50]; // C5, E5, G5, C6
        notes.forEach((freq, i) => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime + i * 0.1);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime + i * 0.1);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i * 0.1 + 0.4);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(audioCtx.currentTime + i * 0.1);
            osc.stop(audioCtx.currentTime + i * 0.1 + 0.4);
        });
    }

    // 更新名單
    function updateList() {
        const text = document.getElementById('input-list').value.trim();
        if (!text) { alert('請輸入名單！'); return; }
        
        pool = text.split('\n').map(line => {
            const parts = line.split(/[,，\s\t]+/);
            return { id: parts[0] || 'N/A', name: parts[1] || parts[0] };
        });
        drawn = [];
        updateUI();
        alert(`名單更新成功，共有 ${pool.length} 人。`);
    }

    // 隨機抽籤
    function draw() {
        if (pool.length === 0) return;
        
        const index = Math.floor(Math.random() * pool.length);
        const winner = pool.splice(index, 1)[0]; // 移出名單，確保不重複
        drawn.push(winner);
        
        // 顯示結果
        document.getElementById('winner-name').innerText = winner.name;
        document.getElementById('winner-id').innerText = `學號: ${winner.id}`;
        
        playWinSound();
        updateUI();
        updateHistory();
    }

    function updateUI() {
        document.getElementById('remain-count').innerText = pool.length;
        document.getElementById('drawn-count').innerText = drawn.length;
        document.getElementById('draw-btn').disabled = (pool.length === 0);
    }

    function updateHistory() {
        const historyDiv = document.getElementById('history-list');
        historyDiv.innerHTML = drawn.map((p, i) => `<div>${i+1}. [${p.id}] ${p.name}</div>`).reverse().join('');
    }

    // 產生100筆測試資料
    function generateSamples() {
        let samples = "";
        for (let i = 1; i <= 100; i++) {
            samples += `ID${1000 + i} 姓名${i}\n`;
        }
        document.getElementById('input-list').value = samples.trim();
    }

    // 處理檔案上傳
    document.getElementById('file-upload').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            document.getElementById('input-list').value = e.target.result;
        };
        reader.readAsText(file);
    });
</script>

</body>
</html>
