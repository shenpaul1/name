<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>照顧者心靈雞湯 - 冥想與呼吸</title>
    <style>
        :root {
            --bg-color: #F3E5F5;
            --primary-purple: #9575CD;
            --dark-purple: #5E35B1;
            --glass-bg: rgba(255, 255, 255, 0.8);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            overflow: hidden; display: flex; justify-content: center; align-items: center;
            background: linear-gradient(135deg, #F3E5F5 0%, #E1BEE7 100%);
        }

        /* 影片背景 */
        .video-background {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            opacity: 0; transition: opacity 1s; pointer-events: none;
        }
        .video-background.active { opacity: 0.5; }
        iframe { width: 100vw; height: 56.25vw; min-height: 100vh; min-width: 177.77vh; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }

        /* 控制按鈕 */
        .controls { position: fixed; top: 20px; right: 20px; display: flex; gap: 10px; z-index: 100; }
        .ctrl-btn {
            background: rgba(255, 255, 255, 0.7); border: 1px solid white;
            width: 45px; height: 45px; border-radius: 50%; cursor: pointer;
            font-size: 1.2rem; display: flex; justify-content: center; align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); transition: 0.3s;
        }

        /* 卡片主體 */
        .card {
            background: var(--glass-bg); padding: 40px 25px; border-radius: 35px;
            box-shadow: 0 15px 35px rgba(103, 58, 183, 0.15); text-align: center;
            max-width: 380px; width: 85%; border: 2px solid white;
            backdrop-filter: blur(12px); z-index: 10; position: relative;
        }

        /* 呼吸計時器樣式 */
        #breath-section { display: none; margin: 20px 0; }
        .breath-circle-wrap {
            width: 150px; height: 150px; margin: 0 auto;
            position: relative; display: flex; align-items: center; justify-content: center;
        }
        .breath-circle {
            width: 60px; height: 60px; background: var(--primary-purple);
            border-radius: 50%; opacity: 0.6;
            box-shadow: 0 0 20px var(--primary-purple);
            transition: all 4s linear; /* 透過 JS 動態控制速度 */
        }
        #breath-text { margin-top: 20px; font-size: 1.3rem; color: var(--dark-purple); font-weight: bold; }

        /* 語錄樣式 */
        #quote-container { min-height: 140px; display: flex; align-items: center; justify-content: center; margin-bottom: 25px; }
        #quote { font-size: 1.15rem; line-height: 1.8; transition: opacity 0.6s; }

        .main-btn {
            background-color: var(--primary-purple); color: white; border: none;
            padding: 15px 30px; border-radius: 50px; font-size: 1rem;
            cursor: pointer; box-shadow: 0 6px 15px rgba(149, 117, 205, 0.3); width: 100%;
        }
        .secondary-btn {
            background: none; border: 1px solid var(--primary-purple); color: var(--primary-purple);
            margin-top: 15px; padding: 10px; border-radius: 50px; width: 100%; cursor: pointer;
        }

        footer { margin-top: 25px; font-size: 0.7rem; color: #7E57C2; opacity: 0.7; }
    </style>
</head>
<body>

<div class="video-background" id="videoLayer">
    <iframe src="https://www.youtube.com/embed/Z0p9Oon_S8E?autoplay=1&mute=1&loop=1&playlist=Z0p9Oon_S8E&controls=0" frameborder="0"></iframe>
</div>

<audio id="bgm" loop><source src="bgm.mp3" type="audio/mpeg"></audio>

<div class="controls">
    <button class="ctrl-btn" onclick="toggleVideo()">🎬</button>
    <button class="ctrl-btn" id="music-btn" onclick="toggleMusic()">🔇</button>
</div>

<div class="card">
    <div id="content-section">
        <span style="font-size: 2.5rem;">🪻</span>
        <h1>親愛的，請給自己一點空間</h1>
        <div id="quote-container"><div id="quote">深呼吸，準備好進入平靜了嗎？</div></div>
        <button class="main-btn" onclick="getNewQuote()">換一句暖心語錄</button>
    </div>

    <div id="breath-section">
        <h1>專注呼吸 (4-4-8 節奏)</h1>
        <div class="breath-circle-wrap">
            <div class="breath-circle" id="circle"></div>
        </div>
        <div id="breath-text">準備開始...</div>
    </div>

    <button class="secondary-btn" id="mode-btn" onclick="toggleMode()">切換至冥想呼吸模式</button>
    <footer>薰衣草影音站 ‧ 您的靜心角落</footer>
</div>

<script>
    // 1. 基礎設定
    const bgm = document.getElementById('bgm');
    const musicBtn = document.getElementById('music-btn');
    let isPlaying = false;
    let isVideoActive = false;
    let isBreathMode = false;

    function toggleMusic() {
        if (isPlaying) { bgm.pause(); musicBtn.innerText = "🔇"; } 
        else { bgm.play(); musicBtn.innerText = "🔊"; }
        isPlaying = !isPlaying;
    }

    function toggleVideo() {
        isVideoActive = !isVideoActive;
        document.getElementById('videoLayer').classList.toggle('active', isVideoActive);
    }

    // 2. 模式切換
    function toggleMode() {
        isBreathMode = !isBreathMode;
        const content = document.getElementById('content-section');
        const breath = document.getElementById('breath-section');
        const modeBtn = document.getElementById('mode-btn');

        if (isBreathMode) {
            content.style.display = 'none';
            breath.style.display = 'block';
            modeBtn.innerText = '切換回暖心語錄';
            startBreathing();
        } else {
            content.style.display = 'block';
            breath.style.display = 'none';
            modeBtn.innerText = '切換至冥想呼吸模式';
            stopBreathing();
        }
    }

    // 3. 呼吸計時器邏輯 (4-4-8 節奏)
    let breathInterval;
    function startBreathing() {
        const circle = document.getElementById('circle');
        const text = document.getElementById('breath-text');
        
        const runCycle = () => {
            // 吸氣 4s
            text.innerText = "吸氣... (4秒)";
            circle.style.transition = "all 4s ease-out";
            circle.style.transform = "scale(2.5)";
            circle.style.opacity = "1";

            setTimeout(() => {
                // 憋氣 4s
                text.innerText = "暫停... (4秒)";
                setTimeout(() => {
                    // 吐氣 8s
                    text.innerText = "緩慢吐氣... (8秒)";
                    circle.style.transition = "all 8s ease-in";
                    circle.style.transform = "scale(1)";
                    circle.style.opacity = "0.4";
                }, 4000);
            }, 4000);
        };

        runCycle();
        breathInterval = setInterval(runCycle, 16500); // 總循環約 16秒
    }

    function stopBreathing() {
        clearInterval(breathInterval);
        document.getElementById('circle').style.transform = "scale(1)";
    }

    // 4. 語錄資料 (500句架構)
    const quotes = [
         "你現在所做的一切，是這世界上最溫柔的承擔。", "你的陪伴，就是最良效的藥方。", "不一定要做到完美，你的用心就是最好的照顧。", 
        "因為有你，這段路才不顯得那麼孤單。", "你可以累，這完全沒有問題。", "不完美也沒關係，你已經盡力了。",
        "今天沒做完的事，就留給明天吧。", "你是照顧者，也是需要被呵護的孩子。", "哭出來也沒關係，眼淚能洗滌壓力。",
        "現在，請跟我一起深呼吸：吸氣，吐氣。", "閉上眼，讓肩膀放鬆三秒鐘。", "把手放在心口，感受自己的心跳。",
        "每一口呼吸，都是在為自己充電。", "今天的挑戰已過期，請領取明天的勇氣。", "你是光，即便在陰影中也依然閃耀。"
        // ... 此處可持續擴充
    ];

    function getNewQuote() {
        const q = document.getElementById('quote');
        q.style.opacity = 0;
        setTimeout(() => {
            q.innerText = quotes[Math.floor(Math.random() * quotes.length)];
            q.style.opacity = 1;
        }, 600);
    }

    window.onload = getNewQuote;
</script>

</body>
</html>
