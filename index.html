<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三欄式抽籤系統</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; color: #333; margin: 0; padding: 20px; }
        .header { text-align: center; margin-bottom: 20px; color: #2c3e50; }
        
        /* 核心三欄排版 */
        .grid-container {
            display: grid;
            grid-template-columns: 1fr 1.5fr 1fr; /* 左:中:右 比例約 1 : 1.5 : 1 */
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        /* 區塊共用樣式 */
        .panel { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .panel h3 { margin-top: 0; color: #1a73e8; border-bottom: 2px solid #f0f2f5; padding-bottom: 10px; }
        
        /* 左側：名單輸入區 */
        textarea { width: 100%; height: 400px; box-sizing: border-box; padding: 10px; border: 1px solid #ccc; border-radius: 6px; resize: none; font-size: 14px; line-height: 1.5; }
        .btn { display: block; width: 100%; padding: 12px; margin-top: 10px; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.2s; }
        .btn-update { background-color: #3498db; color: white; }
        .btn-update:hover { background-color: #2980b9; }
        
        /* 中間：抽籤主區 */
        .draw-status { display: flex; justify-content: space-between; font-size: 18px; font-weight: bold; margin-bottom: 20px; }
        .btn-draw { background-color: #e74c3c; color: white; font-size: 24px; padding: 20px; border-radius: 50px; box-shadow: 0 4px 0 #c0392b; margin-bottom: 30px; }
        .btn-draw:hover { background-color: #c0392b; transform: translateY(2px); box-shadow: 0 2px 0 #962d22; }
        .btn-draw:disabled { background-color: #bdc3c7; box-shadow: 0 4px 0 #95a5a6; cursor: not-allowed; }
        
        .winner-box { text-align: center; padding: 40px 20px; background: #fffde7; border: 3px dashed #fbc02d; border-radius: 12px; min-height: 150px; display: flex; flex-direction: column; justify-content: center; }
        .winner-title { color: #888; font-size: 16px; margin-bottom: 10px; }
        .winner-name { font-size: 48px; font-weight: bold; color: #d32f2f; margin: 0; line-height: 1.2; }
        .winner-id { font-size: 24px; color: #555; margin-top: 10px; }
        
        /* 右側：中獎名單區 */
        .history-list { height: 400px; overflow-y: auto; padding-right: 5px; }
        .history-item { background: #f9f9f9; padding: 12px; margin-bottom: 8px; border-radius: 6px; border-left: 4px solid #2ecc71; font-weight: bold; display: flex; justify-content: space-between; }
        .history-item span.id { color: #7f8c8d; font-size: 14px; font-weight: normal; }

        /* 響應式設計：小螢幕變為上下排列 */
        @media (max-width: 900px) {
            .grid-container { grid-template-columns: 1fr; }
            textarea { height: 200px; }
            .history-list { height: 250px; }
        }
    </style>
</head>
<body>

<h1 class="header">🎲 三欄式不重複抽籤系統</h1>

<div class="grid-container">
    <div class="panel">
        <h3>1. 貼上名單</h3>
        <p style="font-size: 13px; color: #666; margin-top: -5px;">支援直接貼上。格式：學號 姓名 (用空格或逗號隔開)</p>
        <textarea id="input-list" placeholder="請在此貼上名單...&#10;1101 王大明&#10;1102 李小華"></textarea>
        <button class="btn btn-update" onclick="updateList()">確認並載入名單</button>
    </div>

    <div class="panel">
        <h3>2. 隨機抽籤</h3>
        <div class="draw-status">
            <span>待抽人數：<span id="remain-count" style="color: #3498db;">0</span> 人</span>
            <span>已抽出：<span id="drawn-count" style="color: #e74c3c;">0</span> 人</span>
        </div>
        
        <button id="draw-btn" class="btn btn-draw" onclick="draw()">🎊 開始抽籤 🎊</button>

        <div class="winner-box">
            <div class="winner-title">目前中獎者</div>
            <div id="winner-name" class="winner-name">等待抽籤...</div>
            <div id="winner-id" class="winner-id"></div>
        </div>
    </div>

    <div class="panel">
        <h3>3. 中獎名單</h3>
        <div id="history-list" class="history-list">
            <div style="color: #aaa; text-align: center; margin-top: 20px;">尚未有中獎紀錄</div>
        </div>
    </div>
</div>

<script>
    let pool = [];
    let drawn = [];
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    // 播放中獎音效
    function playWinSound() {
        const notes = [523.25, 659.25, 783.99, 1046.50]; // C5, E5, G5, C6
        notes.forEach((freq, i) => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime + i * 0.1);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime + i * 0.1);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i * 0.1 + 0.4);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(audioCtx.currentTime + i * 0.1);
            osc.stop(audioCtx.currentTime + i * 0.1 + 0.4);
        });
    }

    // 載入名單
    function updateList() {
        const text = document.getElementById('input-list').value.trim();
        if (!text) { alert('名單不可為空！請貼上資料。'); return; }
        
        // 支援換行分割，並容許逗號、Tab或空格分開學號與姓名
        pool = text.split('\n').filter(line => line.trim() !== '').map(line => {
            const parts = line.trim().split(/[,，\s\t]+/);
            return { 
                id: parts.length > 1 ? parts[0] : '無學號', 
                name: parts.length > 1 ? parts[1] : parts[0] 
            };
        });
        
        drawn = []; // 清空歷史
        updateUI();
        document.getElementById('winner-name').innerText = "等待抽籤...";
        document.getElementById('winner-id').innerText = "";
    }

    // 執行抽籤
    function draw() {
        if (pool.length === 0) return;
        
        // 隨機選取並移出名單 (確保不重複)
        const index = Math.floor(Math.random() * pool.length);
        const winner = pool.splice(index, 1)[0]; 
        
        // 加入中獎名單並放到最前面
        drawn.unshift(winner); 
        
        // 更新畫面
        document.getElementById('winner-name').innerText = winner.name;
        document.getElementById('winner-id').innerText = winner.id !== '無學號' ? `學號: ${winner.id}` : '';
        
        playWinSound();
        updateUI();
    }

    // 更新介面與歷史名單
    function updateUI() {
        document.getElementById('remain-count').innerText = pool.length;
        document.getElementById('drawn-count').innerText = drawn.length;
        document.getElementById('draw-btn').disabled = (pool.length === 0);
        
        const historyDiv = document.getElementById('history-list');
        if (drawn.length === 0) {
            historyDiv.innerHTML = '<div style="color: #aaa; text-align: center; margin-top: 20px;">尚未有中獎紀錄</div>';
        } else {
            historyDiv.innerHTML = drawn.map((p, i) => `
                <div class="history-item">
                    <span>${p.name}</span>
                    <span class="id">${p.id}</span>
                </div>
            `).join('');
        }
    }
</script>

</body>
</html>
