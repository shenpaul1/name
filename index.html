<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全功能！不重複抽籤系統</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; color: #333; margin: 0; padding: 20px; }
        .header { text-align: center; margin-bottom: 20px; color: #2c3e50; }
        
        .grid-container { display: grid; grid-template-columns: 1fr 1.5fr 1fr; gap: 20px; max-width: 1200px; margin: 0 auto; }
        .panel { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .panel h3 { margin-top: 0; color: #1a73e8; border-bottom: 2px solid #f0f2f5; padding-bottom: 10px; font-size: 18px; }
        
        /* 左側表單樣式 */
        .input-group { background: #f8f9fa; padding: 12px; border-radius: 8px; border: 1px solid #e9ecef; margin-bottom: 15px; }
        .input-group-title { font-size: 14px; font-weight: bold; margin: 0 0 8px 0; color: #2c3e50; }
        .flex-row { display: flex; gap: 8px; margin-bottom: 8px; }
        input[type="text"] { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; font-family: inherit; }
        textarea { width: 100%; height: 120px; box-sizing: border-box; padding: 10px; border: 1px solid #ccc; border-radius: 4px; resize: vertical; font-size: 14px; line-height: 1.5; }
        
        .btn { display: block; width: 100%; padding: 10px; border: none; border-radius: 6px; cursor: pointer; font-size: 15px; font-weight: bold; transition: 0.2s; }
        .btn-add { background-color: #2ecc71; color: white; }
        .btn-add:hover { background-color: #27ae60; }
        .btn-update { background-color: #3498db; color: white; margin-top: 8px; }
        .btn-update:hover { background-color: #2980b9; }
        .btn-clear { background-color: #95a5a6; color: white; margin-top: 15px; }
        .btn-clear:hover { background-color: #7f8c8d; }
        
        /* 中間抽籤區 */
        .draw-status { display: flex; justify-content: space-between; font-size: 16px; font-weight: bold; margin-bottom: 20px; background: #e8f4fd; padding: 10px; border-radius: 8px;}
        .btn-draw { background-color: #e74c3c; color: white; font-size: 24px; padding: 20px; border-radius: 50px; box-shadow: 0 4px 0 #c0392b; margin-bottom: 30px; }
        .btn-draw:hover:not(:disabled) { background-color: #c0392b; transform: translateY(2px); box-shadow: 0 2px 0 #962d22; }
        .btn-draw:disabled { background-color: #bdc3c7; box-shadow: 0 4px 0 #95a5a6; cursor: not-allowed; }
        
        .winner-box { text-align: center; padding: 40px 20px; background: #fffde7; border: 3px dashed #fbc02d; border-radius: 12px; min-height: 150px; display: flex; flex-direction: column; justify-content: center; overflow: hidden;}
        .winner-title { color: #888; font-size: 16px; margin-bottom: 10px; }
        .winner-name { font-size: 42px; font-weight: bold; color: #d32f2f; margin: 0; line-height: 1.2; }
        .winner-id { font-size: 20px; color: #555; margin-top: 10px; }
        
        /* 動畫 */
        .spinning { color: #3498db !important; opacity: 0.8; transform: scale(0.95); }
        .winner-reveal { animation: pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes pop { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        
        /* 右側紀錄區 */
        .history-list { height: 500px; overflow-y: auto; padding-right: 5px; }
        .history-item { background: #f9f9f9; padding: 12px; margin-bottom: 8px; border-radius: 6px; border-left: 4px solid #2ecc71; font-weight: bold; display: flex; justify-content: space-between; animation: slideIn 0.3s ease-out; }
        .history-item span.id { color: #7f8c8d; font-size: 14px; font-weight: normal; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

        @media (max-width: 900px) { .grid-container { grid-template-columns: 1fr; } .history-list { height: 250px; } }
    </style>
</head>
<body>

<h1 class="header">🎲 全功能！不重複抽籤系統</h1>

<div class="grid-container">
    <div class="panel">
        <h3>⚙️ 名單設定</h3>
        
        <div class="input-group">
            <p class="input-group-title">➕ 單筆手動新增</p>
            <div class="flex-row">
                <input type="text" id="single-id" placeholder="學號(選填)" style="flex: 1;">
                <input type="text" id="single-name" placeholder="姓名(必填)" style="flex: 2;">
            </div>
            <button class="btn btn-add" onclick="addSingle()">加入名單</button>
        </div>

        <div class="input-group">
            <p class="input-group-title">📁 批次載入與貼上</p>
            <input type="file" id="file-upload" accept=".txt,.csv" style="margin-bottom: 8px; width: 100%; font-size: 13px;">
            <textarea id="input-list" placeholder="在此貼上多筆資料...&#10;1101 王大明&#10;1102 李小華"></textarea>
            <button class="btn btn-update" onclick="loadBulkList()">覆蓋並載入批次名單</button>
        </div>

        <button class="btn btn-clear" onclick="clearAll()">🗑️ 清空所有狀態</button>
    </div>

    <div class="panel">
        <h3>🎯 隨機抽籤</h3>
        <div class="draw-status">
            <span>待抽人數：<span id="remain-count" style="color: #3498db; font-size: 20px;">0</span> 人</span>
            <span>已抽出：<span id="drawn-count" style="color: #e74c3c; font-size: 20px;">0</span> 人</span>
        </div>
        
        <button id="draw-btn" class="btn btn-draw" onclick="startDraw()" disabled>🎊 開始抽籤 🎊</button>

        <div class="winner-box">
            <div class="winner-title">目前中獎者</div>
            <div id="winner-name" class="winner-name">等待名單...</div>
            <div id="winner-id" class="winner-id"></div>
        </div>
    </div>

    <div class="panel">
        <h3>🏆 中獎歷史</h3>
        <div id="history-list" class="history-list">
            <div style="color: #aaa; text-align: center; margin-top: 20px;">尚未有中獎紀錄</div>
        </div>
    </div>
</div>

<script>
    let pool = [];
    let drawn = [];
    let isSpinning = false;
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playWinSound() {
        const notes = [523.25, 659.25, 783.99, 1046.50];
        notes.forEach((freq, i) => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime + i * 0.1);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime + i * 0.1);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i * 0.1 + 0.5);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(audioCtx.currentTime + i * 0.1);
            osc.stop(audioCtx.currentTime + i * 0.1 + 0.5);
        });
    }

    // 單筆加入
    function addSingle() {
        const idInput = document.getElementById('single-id');
        const nameInput = document.getElementById('single-name');
        const id = idInput.value.trim() || '無學號';
        const name = nameInput.value.trim();
        
        if (!name) { alert('請輸入姓名！'); return; }
        
        pool.push({ id, name });
        idInput.value = ''; nameInput.value = '';
        
        updateUI();
        document.getElementById('winner-name').innerText = "準備就緒";
        document.getElementById('winner-name').classList.remove('winner-reveal');
    }

    // 處理檔案上傳
    document.getElementById('file-upload').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            document.getElementById('input-list').value = e.target.result;
            document.getElementById('file-upload').value = '';
        };
        reader.readAsText(file);
    });

    // 批次載入
    function loadBulkList() {
        const text = document.getElementById('input-list').value.trim();
        if (!text) { alert('文字區不可為空！'); return; }
        
        // 這裡會覆蓋原有的 pool
        pool = text.split('\n').filter(line => line.trim() !== '').map(line => {
            const parts = line.trim().split(/[,，\s\t]+/);
            return { id: parts.length > 1 ? parts[0] : '無學號', name: parts.length > 1 ? parts[1] : parts[0] };
        });
        
        drawn = []; // 批次載入時清空歷史
        updateUI();
        document.getElementById('winner-name').innerText = "準備就緒";
        document.getElementById('winner-id').innerText = "";
        document.getElementById('winner-name').classList.remove('winner-reveal');
        alert(`成功載入 ${pool.length} 筆名單！`);
    }

    function clearAll() {
        if(confirm('確定要清空所有名單與紀錄嗎？')) {
            document.getElementById('input-list').value = '';
            document.getElementById('single-id').value = '';
            document.getElementById('single-name').value = '';
            pool = []; drawn = [];
            updateUI();
            document.getElementById('winner-name').innerText = "等待名單...";
            document.getElementById('winner-id').innerText = "";
        }
    }

    function startDraw() {
        if (pool.length === 0 || isSpinning) return;
        
        isSpinning = true;
        updateUI();
        
        const winIndex = Math.floor(Math.random() * pool.length);
        const winner = pool[winIndex];
        
        const nameEl = document.getElementById('winner-name');
        const idEl = document.getElementById('winner-id');
        nameEl.classList.add('spinning');
        nameEl.classList.remove('winner-reveal');
        
        let spins = 0;
        const maxSpins = 25;
        let currentDelay = 30;
        
        function spinTick() {
            if (spins < maxSpins) {
                const randPerson = pool[Math.floor(Math.random() * pool.length)];
                nameEl.innerText = randPerson.name;
                idEl.innerText = randPerson.id !== '無學號' ? randPerson.id : '';
                spins++;
                currentDelay += Math.floor(spins * 1.5); 
                setTimeout(spinTick, currentDelay);
            } else {
                pool.splice(winIndex, 1);
                drawn.unshift(winner);
                
                nameEl.classList.remove('spinning');
                nameEl.classList.add('winner-reveal');
                nameEl.innerText = winner.name;
                idEl.innerText = winner.id !== '無學號' ? `學號: ${winner.id}` : '';
                
                playWinSound();
                isSpinning = false;
                updateUI();
            }
        }
        spinTick();
    }

    function updateUI() {
        document.getElementById('remain-count').innerText = pool.length;
        document.getElementById('drawn-count').innerText = drawn.length;
        document.getElementById('draw-btn').disabled = (pool.length === 0 || isSpinning);
        
        const historyDiv = document.getElementById('history-list');
        if (drawn.length === 0) {
            historyDiv.innerHTML = '<div style="color: #aaa; text-align: center; margin-top: 20px;">尚未有中獎紀錄</div>';
        } else {
            historyDiv.innerHTML = drawn.map((p) => `
                <div class="history-item">
                    <span>${p.name}</span>
                    <span class="id">${p.id}</span>
                </div>
            `).join('');
        }
    }
</script>

</body>
</html>
